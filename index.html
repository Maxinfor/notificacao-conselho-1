<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CONSELHO TUTELAR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; }
        .container { background-color: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        .tab-btn { width: 48%; padding: 10px; cursor: pointer; border: none; border-radius: 6px; background: #e0e0e0; font-weight: bold; }
        .active-tab { background: #007bff; color: white; }
        input { text-transform: uppercase; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .view { display: none; margin-top: 20px; }
        .active-view { display: block; }
        .item-lista { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; background: #fafafa; margin-bottom: 5px; border-radius: 4px; }
        .btn-acao { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; color: white; }
    </style>
</head>
<body>

<div class="container">
    <button class="tab-btn active-tab" onclick="mostrar('cadastro')">CADASTRO</button>
    <button class="tab-btn" onclick="mostrar('pesquisa')">PESQUISAR</button>

    <div id="cadastro" class="view active-view">
        <h3 style="text-align:center;">NOVA NOTIFICAÇÃO</h3>
        <input type="text" id="resp" placeholder="RESPONSÁVEL">
        <input type="text" id="crianca" placeholder="CRIANÇA (SE HOUVER)">
        <input type="date" id="data">
        <input type="time" id="horario">
        <input type="text" id="conselheiro" placeholder="CONSELHEIRO(A)">
        <input type="tel" id="telefone" placeholder="TELEFONE (DDD+NUMERO)">
        
        <button class="btn-acao" style="background: #25D366;" onclick="enviarNotificacao()">ENVIAR NOTIFICAÇÃO (WHATSAPP)</button>
        <button class="btn-acao" style="background: #007bff;" onclick="salvarDados()">SALVAR NO SISTEMA</button>
    </div>

    <div id="pesquisa" class="view">
        <h3 style="text-align:center;">BUSCAR ATENDIMENTOS</h3>
        <input type="text" id="inputBusca" placeholder="DIGITE O NOME DO RESPONSÁVEL..." onkeyup="filtrarLista()">
        <div id="listaResultados"></div>
    </div>
</div>

<script>
    let bancoDados = JSON.parse(localStorage.getItem('atendimentos')) || [];

    function mostrar(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        document.getElementById(id).classList.add('active-view');
        event.target.classList.add('active-tab');
    }

    function salvarDados() {
        const novo = {
            resp: document.getElementById('resp').value,
            crianca: document.getElementById('crianca').value,
            data: document.getElementById('data').value,
            hora: document.getElementById('horario').value,
            conselheiro: document.getElementById('conselheiro').value,
            tel: document.getElementById('telefone').value
        };
        bancoDados.push(novo);
        localStorage.setItem('atendimentos', JSON.stringify(bancoDados));
        alert("SALVO COM SUCESSO!");
        // Limpa campos
        document.querySelectorAll('input').forEach(i => i.value = '');
    }

    function enviarNotificacao() {
        const resp = document.getElementById('resp').value;
        const tel = document.getElementById('telefone').value.replace(/\D/g, '');
        const data = document.getElementById('data').value.split('-').reverse().join('/');
        const msg = `BOM DIA, AQUI É O CONSELHO TUTELAR. VOCÊ ESTÁ SENDO NOTIFICADO(A) A COMPARECER NO DIA ${data} ÀS ${document.getElementById('horario').value}.`;
        window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    function filtrarLista() {
        const busca = document.getElementById('inputBusca').value.toUpperCase();
        const lista = document.getElementById('listaResultados');
        lista.innerHTML = '';
        
        bancoDados.filter(item => item.resp.toUpperCase().includes(busca)).forEach(item => {
            lista.innerHTML += `<div class="item-lista">
                <strong>RESP: ${item.resp}</strong><br>
                CRIANÇA: ${item.crianca || 'N/A'}<br>
                DATA: ${item.data} | HORA: ${item.hora}<br>
                CONSELHEIRO: ${item.conselheiro}
            </div>`;
        });
    }
</script>

</body>
</html>
