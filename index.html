<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notificações - Conselho Tutelar</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; display: flex; justify-content: center; }
        .container { background-color: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        <h2>Notificação de Atendimento</h2>, adicione o ícone:
<div style="text-align:center; font-size: 40px; color: #007bff;"><i class="fa-solid fa-bell"></i></div>
        h2 { text-align: center; color: #333; margin-top: 0; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px; }
        input[type="text"], input[type="date"], input[type="time"], input[type="tel"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { margin: 15px 0; display: flex; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 6px; }
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }
        #campoCrianca { display: none; margin-bottom: 15px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: 0.2s; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        .btn-whatsapp:hover { background-color: #1ebd58; }
        .btn-confirmacao { background-color: #007bff; color: white; }
        .btn-confirmacao:hover { background-color: #0062cc; }
    </style>
</head>
<body>

<div class="container">
    <h2>Notificação de Atendimento</h2>
    
    <div class="form-group">
        <label>Responsável:</label>
        <input type="text" id="responsavel" placeholder="Nome do responsável">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="checkCrianca" onchange="alternarCampoCrianca()">
        <label for="checkCrianca" style="margin-left: 10px; cursor: pointer;">Chamar a criança junto?</label>
    </div>

    <div class="form-group" id="campoCrianca">
        <label>Nome da Criança:</label>
        <input type="text" id="nomeCrianca" placeholder="Nome da criança">
    </div>

    <div class="form-group">
        <label>Data:</label>
        <input type="date" id="data">
    </div>

    <div class="form-group">
        <label>Horário:</label>
        <input type="time" id="horario">
    </div>

    <div class="form-group">
        <label>Conselheiro(a):</label>
        <input type="text" id="conselheiro" placeholder="Nome do(a) conselheiro(a)">
    </div>

    <div class="form-group">
        <label>Telefone do Responsável (com DDD):</label>
        <input type="tel" id="telefone" placeholder="Ex: 11999999999">
    </div>

    <button class="btn-whatsapp" onclick="enviarNotificacao()">Enviar Notificação (WhatsApp)</button>
    <button class="btn-confirmacao" onclick="enviarConfirmacao()">Confirmar ao Conselheiro (Azul)</button>
</div>

<script>
    function alternarCampoCrianca() {
        const campo = document.getElementById('campoCrianca');
        campo.style.display = document.getElementById('checkCrianca').checked ? 'block' : 'none';
    }

    function formatarData(dataInput) {
        if(!dataInput) return "";
        const d = dataInput.split("-");
        return `${d[2]}/${d[1]}/${d[0]}`;
    }

    function enviarNotificacao() {
        const resp = document.getElementById('responsavel').value;
        const crianca = document.getElementById('nomeCrianca').value;
        const dataInput = document.getElementById('data').value;
        const hora = document.getElementById('horario').value;
        const tel = document.getElementById('telefone').value.replace(/\D/g, '');
        const comCrianca = document.getElementById('checkCrianca').checked;

        if (!resp || !dataInput || !hora) {
            alert("Por favor, preencha o Responsável, Data e Horário.");
            return;
        }

        const data = formatarData(dataInput);
        let msg = `Bom dia, aqui é o Conselho Tutelar. Você está sendo notificado(a) a comparecer no dia ${data} às ${hora}`;
        if (comCrianca && crianca) msg += ` junto com a criança ${crianca}`;
        msg += ".";

        window.open(`https://api.whatsapp.com/send?phone=55${tel}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    function enviarConfirmacao() {
        const resp = document.getElementById('responsavel').value;
        const conselheiro = document.getElementById('conselheiro').value;
        const dataInput = document.getElementById('data').value;
        const hora = document.getElementById('horario').value;

        if (!resp || !dataInput || !hora || !conselheiro) {
            alert("Por favor, preencha todos os campos para confirmar.");
            return;
        }

        const data = formatarData(dataInput);
        const msg = `Olá ${conselheiro}, a presença do Responsável ${resp} para o atendimento do dia ${data} às ${hora} foi confirmada.`;
        
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

</body>
</html>
