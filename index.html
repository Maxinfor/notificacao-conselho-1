<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CTPAR</title>
    
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Logo_Conselho_Tutelar_Brasil.png/240px-Logo_Conselho_Tutelar_Brasil.png">
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Logo_Conselho_Tutelar_Brasil.png/240px-Logo_Conselho_Tutelar_Brasil.png">
    
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; }
        .container { background-color: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        
        .logo-header { text-align: center; margin-bottom: 15px; }
        .logo-header img { width: 100px; height: auto; }
        .titulo-ctpar { text-align: center; color: #007bff; margin: -10px 0 15px 0; font-weight: bold; }

        .tabs { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .tab-btn { width: 48%; padding: 10px; cursor: pointer; border: none; border-radius: 6px; background: #e0e0e0; font-weight: bold; }
        .active-tab { background: #007bff; color: white; }
        input { text-transform: uppercase; width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .view { display: none; margin-top: 20px; }
        .active-view { display: block; }
        .item-lista { padding: 12px; border-bottom: 2px solid #ddd; font-size: 14px; background: #fff; margin-bottom: 10px; border-radius: 8px; }
        .btn-acao { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; color: white; }
        .status-pendente { color: orange; font-weight: bold; }
        .status-confirmado { color: green; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Logo_Conselho_Tutelar_Brasil.png/240px-Logo_Conselho_Tutelar_Brasil.png" alt="Logo Conselho Tutelar">
    </div>
    <div class="titulo-ctpar">SISTEMA CTPAR</div>

    <div class="tabs">
        <button id="btn-cadastro" class="tab-btn active-tab" onclick="mostrar('cadastro')">CADASTRO</button>
        <button id="btn-pesquisa" class="tab-btn" onclick="mostrar('pesquisa')">PESQUISAR</button>
    </div>

    <div id="cadastro" class="view active-view">
        <h3 style="text-align:center;">NOVA NOTIFICAÇÃO</h3>
        <input type="text" id="resp" placeholder="RESPONSÁVEL">
        <input type="text" id="crianca" placeholder="CRIANÇA/ADOLESCENTE">
        <input type="date" id="data">
        <input type="time" id="horario">
        <input type="text" id="conselheiro" placeholder="CONSELHEIRO(A)">
        <input type="tel" id="telefone" placeholder="TELEFONE DO RESPONSÁVEL (DDD + NÚMERO)">
        
        <button class="btn-acao" style="background: #25D366;" onclick="salvarENotificar()">SALVAR E NOTIFICAR</button>
    </div>

    <div id="pesquisa" class="view">
        <h3 style="text-align:center;">GESTÃO DE CONFIRMAÇÕES</h3>
        <input type="text" id="inputBusca" placeholder="BUSCAR POR NOME..." onkeyup="filtrarLista()">
        <div id="listaResultados"></div>
    </div>
</div>

<script>
    let bancoDados = JSON.parse(localStorage.getItem('atendimentos')) || [];

    function mostrar(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        
        document.getElementById(id).classList.add('active-view');
        document.getElementById('btn-' + id).classList.add('active-tab');
    }

    function salvarENotificar() {
        const novo = {
            id: Date.now(),
            resp: document.getElementById('resp').value.toUpperCase(),
            crianca: document.getElementById('crianca').value.toUpperCase(),
            data: document.getElementById('data').value,
            hora: document.getElementById('horario').value,
            conselheiro: document.getElementById('conselheiro').value.toUpperCase(),
            tel: document.getElementById('telefone').value,
            status: 'PENDENTE'
        };

        if(!novo.resp || !novo.data || !novo.hora || !novo.tel) {
            alert("Por favor, preencha os campos obrigatórios (Responsável, Data, Hora e Telefone).");
            return;
        }
        
        const dataF = novo.data ? novo.data.split('-').reverse().join('/') : "";
        
        // Mensagem oficial formatada
        const msg = `Bom dia, como vai? Somos do Conselho Tutelar do Paranoá. Solicitamos a presença do(a) senhor(a) ${novo.resp}, responsável por ${novo.crianca || 'seu(à) filho(a)'}, para esclarecimentos.\n\n` +
                    `🗓 Data: ${dataF} às ${novo.hora}h\n` +
                    `📍 Local: Sede do Conselho Tutelar do Paranoá (Área especial Quadra 21, ao lado da UBS 01 do Paranoá)\n` +
                    `👤 Conselheiro(a): ${novo.conselheiro}\n\n` +
                    `⚠️ TRAZER DOCUMENTAÇÃO PESSOAL DO RESPONSÁVEL E DA CRIANÇA, E A CRIANÇA/ADOLESCENTE.\n\n` +
                    `Por favor, confirme o recebimento desta mensagem.\n\n` +
                    `Obs.: O não comparecimento injustificado constitui crime e infração Administrativa (Arts. 236 e 249 do ECA).`;

        window.open(`https://api.whatsapp.com/send?phone=55${novo.tel.replace(/\D/g, '')}&text=${encodeURIComponent(msg)}`, '_blank');
        
        bancoDados.push(novo);
        localStorage.setItem('atendimentos', JSON.stringify(bancoDados));
        alert("Notificação salva e redirecionada para o WhatsApp!");
        
        // Limpar campos
        document.querySelectorAll('#cadastro input').forEach(i => i.value = '');
        filtrarLista();
    }

    function confirmarAoConselheiro(id) {
        const item = bancoDados.find(i => i.id === id);
        const dataF = item.data.split('-').reverse().join('/');
        const msg = `Olá ${item.conselheiro}, a presença de ${item.resp} (Caso: ${item.crianca || 'N/A'}) para o atendimento do dia ${dataF} às ${item.hora} foi CONFIRMADA.`;
        
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        item.status = 'CONFIRMADO';
        localStorage.setItem('atendimentos', JSON.stringify(bancoDados));
        filtrarLista();
    }

    function filtrarLista() {
        const busca = document.getElementById('inputBusca').value.toUpperCase();
        const lista = document.getElementById('listaResultados');
        lista.innerHTML = '';
        
        bancoDados.filter(item => item.resp.includes(busca) || item.crianca.includes(busca)).forEach(item => {
            const btnHtml = item.status === 'PENDENTE' 
                ? `<button class="btn-acao" style="background:#007bff" onclick="confirmarAoConselheiro(${item.id})">CONFIRMAR AO CONSELHEIRO</button>`
                : `<span class="status-confirmado">✔ CONFIRMADO AO CONSELHEIRO</span>`;

            lista.innerHTML += `<div class="item-lista">
                <strong>RESP: ${item.resp}</strong><br>
                CRIANÇA: ${item.crianca || 'N/A'}<br>
                DATA: ${item.data ? item.data.split('-').reverse().join('/') : ''} | HORA: ${item.hora}<br>
                STATUS: <span class="${item.status === 'PENDENTE' ? 'status-pendente' : 'status-confirmado'}">${item.status}</span><br>
                ${btnHtml}
            </div>`;
        });
    }
    
    filtrarLista();
</script>

</body>
</html>
