<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA CTPAR</title>
    
    <link rel="icon" type="image/png" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f3e1.png">
    <link rel="apple-touch-icon" href="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f3e1.png">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; display: flex; justify-content: center; align-items: start; min-height: 100vh; }
        
        /* Container com tamanho fixo e estável para evitar variações de tamanho */
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 600px; margin: auto; min-height: 580px; display: flex; flex-direction: column; }
        
        @media (min-width: 768px) {
            .container { max-width: 700px; padding: 40px; min-height: 620px; }
        }
        
        .titulo-ctpar { text-align: center; color: #007bff; margin-bottom: 25px; font-weight: bold; font-size: 24px; letter-spacing: 0.5px; }

        .tabs { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 10px; }
        .tab-btn { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 6px; background: #e0e0e0; font-weight: bold; font-size: 14px; text-align: center; }
        .active-tab { background: #007bff; color: white; }

        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #555; }
        input, select { text-transform: uppercase; width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; font-family: inherit; font-size: 15px; background-color: #fdfdfd; }
        input:focus, select:focus { border-color: #007bff; outline: none; background-color: #fff; }
        input[type="date"], input[type="time"] { text-transform: none; }

        .view { display: none; flex-grow: 1; }
        .active-view { display: flex; flex-direction: column; }
        
        .view h3 { text-align: center; margin-bottom: 20px; color: #444; font-size: 18px; }

        /* Lista de Resultados com rolagem interna para não empurrar a tela para baixo */
        #listaResultados { margin-top: 15px; display: flex; flex-direction: column; gap: 12px; max-height: 320px; overflow-y: auto; padding-right: 5px; }
        .item-lista { padding: 15px; border: 1px solid #e2e8f0; font-size: 15px; background: #fafafa; border-radius: 8px; line-height: 1.6; }
        
        .btn-acao { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; color: white; text-align: center; }
        
        .status-pendente { color: #f39c12; font-weight: bold; }
        .status-confirmado { color: #27ae60; font-weight: bold; display: inline-block; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="titulo-ctpar">SISTEMA CTPAR</div>

    <div class="tabs">
        <button id="btn-cadastro" class="tab-btn active-tab" onclick="mostrar('cadastro')">CADASTRO</button>
        <button id="btn-pesquisa" class="tab-btn" onclick="mostrar('pesquisa')">PESQUISAR</button>
    </div>

    <div id="cadastro" class="view active-view">
        <h3>NOVA NOTIFICAÇÃO</h3>
        
        <label for="resp">Nome do Responsável</label>
        <input type="text" id="resp" placeholder="Ex: JOÃO SILVA">
        
        <label for="crianca">Nome da Criança/Adolescente</label>
        <input type="text" id="crianca" placeholder="Ex: PEDRO SILVA">
        
        <label for="data">Data do Atendimento</label>
        <input type="date" id="data">
        
        <label for="horario">Horário</label>
        <input type="time" id="horario">
        
        <label for="conselheiro">Conselheiro(a) Tutelar</label>
        <select id="conselheiro">
            <option value="" disabled selected>SELECIONE O(A) CONSELHEIRO(A)</option>
            <option value="CLÁUDIA">CLÁUDIA</option>
            <option value="LUCINEA">LUCINEA</option>
            <option value="NADELÇO">NADELÇO</option>
            <option value="SAMARA">SAMARA</option>
            <option value="SANDRA">SANDRA</option>
        </select>
        
        <label for="telefone">Telefone do Responsável</label>
        <input type="tel" id="telefone" placeholder="DDD + NÚMERO (SÓ NÚMEROS)">
        
        <button class="btn-acao" style="background: #25D366;" onclick="salvarENotificar()">SALVAR E NOTIFICAR</button>
    </div>

    <div id="pesquisa" class="view">
        <h3>GESTÃO DE CONFIRMAÇÕES</h3>
        <label for="inputBusca">Filtrar Atendimentos</label>
        <input type="text" id="inputBusca" placeholder="BUSCAR POR NOME DO RESPONSÁVEL OU CRIANÇA..." onkeyup="filtrarLista()">
        <div id="listaResultados"></div>
    </div>
</div>

<script>
    let bancoDados = [];
    try {
        bancoDados = JSON.parse(localStorage.getItem('atendimentos')) || [];
    } catch (e) {
        bancoDados = [];
    }

    function mostrar(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        
        const viewAlvo = document.getElementById(id);
        const btnAlvo = document.getElementById('btn-' + id);
        
        if (viewAlvo && btnAlvo) {
            viewAlvo.classList.add('active-view');
            btnAlvo.classList.add('active-tab');
        }
    }

    function salvarENotificar() {
        const respInput = document.getElementById('resp').value.trim();
        const criancaInput = document.getElementById('crianca').value.trim();
        const dataInput = document.getElementById('data').value;
        const horaInput = document.getElementById('horario').value;
        const conselheiroSelect = document.getElementById('conselheiro');
        const conselheiroInput = conselheiroSelect ? conselheiroSelect.value : "";
        const telInput = document.getElementById('telefone').value.trim();

        if(!respInput || !criancaInput || !dataInput || !horaInput || !conselheiroInput || !telInput) {
            alert("Por favor, preencha todos os campos obrigatórios para gerar a notificação.");
            return;
        }

        const novo = {
            id: Date.now(),
            resp: respInput.toUpperCase(),
            crianca: criancaInput.toUpperCase(),
            data: dataInput,
            hora: horaInput,
            conselheiro: conselheiroInput.toUpperCase(),
            tel: telInput,
            status: 'PENDENTE'
        };
        
        // --- ENVIO DOS DADOS PARA O GOOGLE SHEETS ---
        const urlPlanilha = "https://script.google.com/macros/s/AKfycbwubY-gNDKarQmaj1Tsnz9eLtcgNlQrcfjn7VFhPGHvgf45pYCeS243ihxzhP4YGg3h/exec";

        fetch(urlPlanilha, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(novo)
        })
        .then(() => console.log("Dados enviados para o Google Sheets."))
        .catch(err => console.error("Erro na integração da planilha:", err));
        
        const dataF = novo.data ? novo.data.split('-').reverse().join('/') : "";
        
        let saudacao = "Olá!";
        if (novo.hora) {
            const horaInteira = parseInt(novo.hora.split(':')[0], 10);
            if (horaInteira >= 0 && horaInteira < 12) {
                saudacao = "Bom dia!";
            } else if (horaInteira >= 12 && horaInteira < 18) {
                saudacao = "Boa tarde!";
            } else {
                saudacao = "Boa noite!";
            }
        }
        
        const msg = `${saudacao}\n\n` +
                    `O Conselho Tutelar do Paranoá solicita o comparecimento do(a) Sr.(a) *${novo.resp}*, responsável pela criança/adolescente *${novo.crianca}*, para tratar de assunto pertinente ao acompanhamento e à garantia dos direitos da criança/adolescente.\n\n` +
                    `Solicitamos que Vossa Senhoria compareça à sede deste Conselho Tutelar no dia *${dataF}*, às *${novo.hora}h*, ocasião em que será atendido(a) pelo(a) Conselheiro(a) Tutelar *${novo.conselheiro}*.\n\n` +
                    `⚠️ *É indispensável a presença da criança/adolescente e a apresentação dos seguintes documentos:*\n` +
                    `• Documento de identificação do responsável;\n` +
                    `• Documento de identificação da criança/adolescente;\n` +
                    `• Outros documentos que entender pertinentes ao caso.\n\n` +
                    `📍 *Endereço:*\n` +
                    `Área Especial Quadra 21, ao lado da UBS 01 do Paranoá.\n\n` +
                    `Solicitamos a gentileza de confirmar o recebimento desta convocação.\n\n` +
                    `_Observação: O não comparecimento injustificado poderá ensejar a adoção das medidas cabíveis previstas no Estatuto da Criança e do Adolescente – ECA, inclusive aquelas constantes dos artigos 236 e 249 da Lei nº 8.069/1990._`;

        window.open(`https://api.whatsapp.com/send?phone=55${novo.tel.replace(/\D/g, '')}&text=${encodeURIComponent(msg)}`, '_blank');
        
        bancoDados.push(novo);
        localStorage.setItem('atendimentos', JSON.stringify(bancoDados));
        alert("Notificação salva com sucesso!");
        
        document.getElementById('resp').value = '';
        document.getElementById('crianca').value = '';
        document.getElementById('data').value = '';
        document.getElementById('horario').value = '';
        document.getElementById('conselheiro').selectedIndex = 0;
        document.getElementById('telefone').value = '';

        filtrarLista();
    }

    function confirmarAoConselheiro(id) {
        const item = bancoDados.find(i => i.id === id);
        if (!item) return;

        const dataF = item.data ? item.data.split('-').reverse().join('/') : '';
        const msg = `Olá ${item.conselheiro}, a presença de ${item.resp} para o atendimento do dia ${dataF} às ${item.hora} foi CONFIRMADA.`;
        
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(msg)}`, '_blank');
        
        item.status = 'CONFIRMADO';
        localStorage.setItem('atendimentos', JSON.stringify(bancoDados));
        filtrarLista();
    }

    function filtrarLista() {
        const buscaInput = document.getElementById('inputBusca');
        const busca = buscaInput ? buscaInput.value.trim().toUpperCase() : '';
        const lista = document.getElementById('listaResultados');
        if (!lista) return;

        lista.innerHTML = '';
        
        const registrosFiltrados = bancoDados.filter(item => {
            const respMatch = item.resp ? item.resp.includes(busca) : false;
            const criancaMatch = item.crianca ? item.crianca.includes(busca) : false;
            return respMatch || criancaMatch;
        });

        if (registrosFiltrados.length === 0) {
            lista.innerHTML = `<p style="text-align:center; color:#888; font-size:14px; margin-top:10px;">Nenhum atendimento cadastrado.</p>`;
            return;
        }

        registrosFiltrados.forEach(item => {
            const btnHtml = item.status === 'PENDENTE' 
                ? `<button class="btn-acao" style="background:#007bff" onclick="confirmarAoConselheiro(${item.id})">CONFIRMAR AO CONSELHEIRO</button>`
                : `<span class="status-confirmado">✔ CONFIRMADO AO CONSELHEIRO</span>`;

            const dataExibicao = item.data ? item.data.split('-').reverse().join('/') : '';

            lista.innerHTML += `<div class="item-lista">
                <strong>RESPONSÁVEL:</strong> ${item.resp || ''}<br>
                <strong>CRIANÇA/ADOLESCENTE:</strong> ${item.crianca || ''}<br>
                <strong>DATA:</strong> ${dataExibicao} | <strong>HORA:</strong> ${item.hora || ''}h<br>
                <strong>STATUS:</strong> <span class="${item.status === 'PENDENTE' ? 'status-pendente' : 'status-confirmado'}">${item.status}</span><br>
                ${btnHtml}
            </div>`;
        });
    }
    
    filtrarLista();
</script>

</body>
</html>
